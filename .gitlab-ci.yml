# GitLab CI/CD — SonarQube + OWASP Dependency-Check
# Урок 9: Анализ зависимостей в CI/CD

image: python:3.11-slim

stages:
  - test
  - dependency-check
  - scan

variables:
  SONAR_PROJECT_KEY: "vulnerable-app"
  SONAR_PROJECT_VERSION: "1.0-lesson10"
  GIT_DEPTH: "0"

test:
  stage: test
  script:
    - echo "Tests passed"

# Анализ зависимостей на известные CVE
owasp-dependency-check:
  stage: dependency-check
  image: owasp/dependency-check:latest
  script:
    - /usr/share/dependency-check/bin/dependency-check.sh
      --project "vulnerable-app"
      --scan vulnerable-app/requirements.txt
      --format JSON
      --out dependency-check-report.json
      --failOnCVSS 7
  artifacts:
    paths:
      - dependency-check-report.json
    when: always

sonar-scan:
  stage: scan
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner
      -Dsonar.projectKey="${SONAR_PROJECT_KEY}"
      -Dsonar.projectVersion="${SONAR_PROJECT_VERSION}"
      -Dsonar.sources=vulnerable-app,frontend
      -Dsonar.host.url="${SONAR_HOST_URL}"
      -Dsonar.token="${SONAR_TOKEN}"
  allow_failure: false
