# GitLab CI/CD — мультиязычный анализ SonarQube
# Урок 8: Python + JavaScript

image: python:3.11-slim

stages:
  - test
  - scan

variables:
  SONAR_PROJECT_KEY: "vulnerable-app"
  SONAR_PROJECT_VERSION: "1.0-lesson8"
  GIT_DEPTH: "0"

test:
  stage: test
  script:
    - pip install flask --quiet
    - echo "Tests passed"

sonar-scan:
  stage: scan
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner
      -Dsonar.projectKey="${SONAR_PROJECT_KEY}"
      -Dsonar.projectVersion="${SONAR_PROJECT_VERSION}"
      -Dsonar.sources=vulnerable-app,frontend
      -Dsonar.host.url="${SONAR_HOST_URL}"
      -Dsonar.token="${SONAR_TOKEN}"
  allow_failure: false
